<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-15 | Comparador Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f5c4;
            --accent: #ff6b35;
            --bg: #060910;
            --surface: #0d1117;
            --surface2: #161b22;
            --border: #21262d;
            --text: #e6edf3;
            --muted: #7d8590;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 245, 196, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 196, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        /* Glow top */
        body::after {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(0, 245, 196, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header */
        .badge {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            color: var(--primary);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            border: 1px solid rgba(0, 245, 196, 0.3);
            padding: 4px 14px;
            border-radius: 2px;
            margin-bottom: 24px;
            animation: fadeIn 0.6s ease forwards;
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            color: var(--text);
            letter-spacing: -0.02em;
            line-height: 1;
            margin-bottom: 8px;
            animation: fadeIn 0.8s ease forwards;
            position: relative;
        }

        .logo span {
            color: var(--primary);
            text-shadow: 0 0 30px rgba(0, 245, 196, 0.5);
        }

        .tagline {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            margin-bottom: 56px;
            animation: fadeIn 1s ease forwards;
        }

        /* Search */
        .search-wrapper {
            width: 100%;
            position: relative;
            animation: fadeIn 1.2s ease forwards;
        }

        .search-wrapper::before {
            content: '>';
            font-family: 'Share Tech Mono', monospace;
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 1rem;
            pointer-events: none;
            z-index: 1;
        }

        input {
            width: 100%;
            padding: 18px 20px 18px 44px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.95rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            outline: none;
            transition: all 0.3s ease;
            letter-spacing: 0.02em;
        }

        input::placeholder {
            color: var(--muted);
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 245, 196, 0.08), 0 0 20px rgba(0, 245, 196, 0.05);
        }

        button {
            margin-top: 12px;
            width: 100%;
            padding: 16px;
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--primary);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
            z-index: -1;
        }

        button:hover {
            color: var(--bg);
        }

        button:hover::before {
            transform: scaleX(1);
        }

        /* Result */
        #resultado {
            width: 100%;
            margin-top: 40px;
            animation: fadeIn 0.5s ease;
        }

        .produto-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 28px;
            position: relative;
            overflow: hidden;
        }

        .produto-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), transparent);
        }

        .produto-tag {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
            color: var(--primary);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: block;
        }

        .produto-nome {
            font-family: 'Orbitron', monospace;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .produto-desc {
            font-size: 0.9rem;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .produto-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .produto-preco {
            font-family: 'Orbitron', monospace;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary);
        }

        .produto-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            font-family: 'Orbitron', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .produto-link:hover {
            background: #ff8555;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);
        }

        .nao-encontrado {
            font-family: 'Share Tech Mono', monospace;
            color: var(--muted);
            font-size: 0.85rem;
            text-align: center;
            padding: 32px;
            border: 1px dashed var(--border);
            border-radius: 4px;
        }

        .nao-encontrado span {
            color: var(--accent);
        }

        /* Footer */
        .footer {
            margin-top: 80px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
            color: var(--border);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            animation: fadeIn 1.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scanline effect */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(0, 245, 196, 0.05);
            animation: scan 8s linear infinite;
            pointer-events: none;
            z-index: 999;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100vh; }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <div class="container">
        <div class="badge">Sistema de Comparação v1.0</div>
        
        <h1 class="logo">B<span>-</span>15</h1>
        <p class="tagline">// descreva o produto. a gente encontra o melhor.</p>

        <div class="search-wrapper">
            <input 
                type="text" 
                id="busca" 
                placeholder="fone com cancelamento de ruído até R$300..."
                onkeydown="if(event.key==='Enter') buscar()"
            />
            <button onclick="buscar()">Iniciar Busca</button>
        </div>

        <div id="resultado"></div>

        <div class="footer">B-15 © 2026 — Todos os direitos reservados</div>
    </div>

    <script>
        const produtos = [
            {
                palavras: ["fone", "cancelamento", "ruído", "headphone", "áudio", "ouvido", "bluetooth"],
                nome: "JBL Tune 520BT",
                descricao: "Bluetooth 5.3, até 57h de bateria com case, Pure Bass Sound. Leve, dobrável e com microfone integrado. Ideal para uso diário.",
                preco: "R$299",
                link: "https://www.amazon.com.br/JBL-Fone-Ouvido-Tune-520BT/dp/B0C4CCMNQT?tag=b150d-20"
            },
            {
                palavras: ["celular", "smartphone", "câmera", "foto", "android", "telefone"],
                nome: "Samsung Galaxy A15",
                descricao: "Tela Super AMOLED 6.5\", câmera tripla 50MP, bateria 5000mAh, 128GB de armazenamento. Excelente custo-benefício.",
                preco: "R$999",
                link: "https://www.amazon.com.br/dp/B0C4CCMNQT?tag=b150d-20"
            },
            {
                palavras: ["notebook", "computador", "laptop", "pc", "trabalho", "estudo"],
                nome: "Acer Aspire 3",
                descricao: "Intel Core i3-N305, 8GB RAM, SSD 256GB, tela 15.6\" Full HD. Perfeito para estudos e trabalho do dia a dia.",
                preco: "R$2.199",
                link: "https://www.amazon.com.br/dp/B0C4CCMNQT?tag=b150d-20"
            }
        ];

        function buscar() {
            const texto = document.getElementById('busca').value.toLowerCase().trim();
            const resultado = document.getElementById('resultado');

            if (!texto) {
                resultado.innerHTML = `
                    <div class="nao-encontrado">
                        <span>></span> aguardando input do usuário...
                    </div>
                `;
                return;
            }

            const encontrado = produtos.find(p =>
                p.palavras.some(palavra => texto.includes(palavra))
            );

            if (encontrado) {
                resultado.innerHTML = `
                    <div class="produto-card">
                        <span class="produto-tag">// recomendação encontrada</span>
                        <div class="produto-nome">${encontrado.nome}</div>
                        <div class="produto-desc">${encontrado.descricao}</div>
                        <div class="produto-footer">
                            <div class="produto-preco">${encontrado.preco}</div>
                            <a class="produto-link" href="${encontrado.link}" target="_blank">
                                Ver na Amazon →
                            </a>
                        </div>
                    </div>
                `;
            } else {
                resultado.innerHTML = `
                    <div class="nao-encontrado">
                        <span>></span> produto não encontrado. tente outras palavras.
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
