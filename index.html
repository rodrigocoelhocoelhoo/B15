<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-15 | Comparador Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <button class="menu-btn" onclick="toggleMenu()" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
        <div class="logo-header">B<span>-</span>15</div>
        <button class="header-icon" aria-label="Buscar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
    </header>

    <!-- MENU LATERAL -->
    <div class="overlay" onclick="toggleMenu()"></div>
    <nav class="sidebar">
        <div class="sidebar-header">
            <div class="logo-header">B<span>-</span>15</div>
            <button onclick="toggleMenu()" class="close-btn">✕</button>
        </div>
        <ul class="sidebar-menu">
            <li><a href="#" onclick="toggleMenu()">🏠 Início</a></li>
            <li><a href="#categorias" onclick="toggleMenu()">📦 Categorias</a></li>
            <li><a href="#" onclick="toggleMenu()">❤️ Favoritos</a></li>
            <li><a href="#" onclick="toggleMenu()">ℹ️ Sobre o B-15</a></li>
        </ul>
        <div class="sidebar-footer">
            <p>B-15 © 2026</p>
            <p>Comparador Inteligente</p>
        </div>
    </nav>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="main">

        <!-- HERO -->
        <section class="hero">
            <div class="hero-badge">Comparador Inteligente de Tecnologia</div>
            <h1 class="hero-title">Encontre o produto<br><span>certo para você</span></h1>
            <p class="hero-sub">Descreva o que você precisa. A gente compara as melhores opções por preço e qualidade.</p>

            <div class="search-box">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="text" id="busca" placeholder="ex: fone bluetooth, notebook para estudar, tv para sala..." onkeydown="if(event.key==='Enter') buscar()"/>
            </div>
            <button class="btn-comparar" onclick="buscar()">Comparar Agora</button>
        </section>

        <!-- RESULTADO -->
        <section id="resultado" class="resultado-section"></section>

        <!-- CATEGORIAS POPULARES -->
        <section class="categorias-section" id="categorias">
            <h2 class="section-title">Categorias Populares</h2>
            <div class="categorias-grid">
                <button class="categoria-card" onclick="buscarCategoria('fone')">
                    <span class="cat-icon">🎧</span>
                    <span class="cat-nome">Fones</span>
                </button>
                <button class="categoria-card" onclick="buscarCategoria('celular')">
                    <span class="cat-icon">📱</span>
                    <span class="cat-nome">Celulares</span>
                </button>
                <button class="categoria-card" onclick="buscarCategoria('notebook')">
                    <span class="cat-icon">💻</span>
                    <span class="cat-nome">Notebooks</span>
                </button>
                <button class="categoria-card" onclick="buscarCategoria('tv')">
                    <span class="cat-icon">📺</span>
                    <span class="cat-nome">TVs</span>
                </button>
                <button class="categoria-card" onclick="buscarCategoria('smartwatch')">
                    <span class="cat-icon">⌚</span>
                    <span class="cat-nome">Smartwatches</span>
                </button>
                <button class="categoria-card" onclick="buscarCategoria('tablet')">
                    <span class="cat-icon">📟</span>
                    <span class="cat-nome">Tablets</span>
                </button>
                <button class="categoria-card" onclick="buscarCategoria('mouse')">
                    <span class="cat-icon">🖱️</span>
                    <span class="cat-nome">Mouses</span>
                </button>
                <button class="categoria-card" onclick="buscarCategoria('kindle')">
                    <span class="cat-icon">📖</span>
                    <span class="cat-nome">Leitores</span>
                </button>
                <button class="categoria-card" onclick="buscarCategoria('powerbank')">
                    <span class="cat-icon">🔋</span>
                    <span class="cat-nome">Carregadores</span>
                </button>
            </div>
        </section>

    </main>

    <!-- BARRA INFERIOR MOBILE -->
    <nav class="bottom-nav">
        <button class="nav-item active" onclick="irPara('inicio')">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Início</span>
        </button>
        <button class="nav-item" onclick="irPara('categorias')">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            <span>Categorias</span>
        </button>
        <button class="nav-item nav-item-center" onclick="document.getElementById('busca').focus()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <span>Buscar</span>
        </button>
        <button class="nav-item" onclick="irPara('favoritos')">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            <span>Favoritos</span>
        </button>
        <button class="nav-item" onclick="irPara('conta')">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Conta</span>
        </button>
    </nav>

    <script src="categorias/fones.js"></script>
<script src="categorias/celulares.js"></script>
<script src="categorias/notebooks.js"></script>
<script src="categorias/tvs.js"></script>
<script src="categorias/smartwatches.js"></script>
<script src="categorias/tablets.js"></script>
<script src="categorias/mouses.js"></script>
<script src="categorias/kindles.js"></script>
<script src="categorias/powerbanks.js"></script>
<script src="produtos.js"></script>
    <script>
        function toggleMenu() {
            document.querySelector('.sidebar').classList.toggle('open');
            document.querySelector('.overlay').classList.toggle('open');
        }

        function buscarCategoria(termo) {
            document.getElementById('busca').value = termo;
            buscar();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function irPara(secao) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
            if (secao === 'categorias') {
                document.getElementById('categorias').scrollIntoView({ behavior: 'smooth' });
            } else if (secao === 'inicio') {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
